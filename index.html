      7:{wealth:'Over-analysis causes paralysis. Drop your arrogance and use social skills to lubricate your business logic.',love:'Master of cold violence. You habitually shut down, leaving your partner facing a wall of ice.',health:'Poor water metabolism. Watch kidneys and endocrine system.'},
      8:{wealth:'Extreme lust for power leads to long-term betrayal. Learn to hide your edge and share the wealth.',love:'You bring your desire for control into the family, suppressing true emotions and never showing vulnerability.',health:'Stress-induced hidden diseases. High risk of cardiovascular emergencies.'},
      9:{wealth:'A million ideas, zero execution. You are easily swayed by grand concepts and desperately need a pragmatic executor to manage finances.',love:'Overflowing compassion blurs boundaries. You may be kind to everyone but neglect your partner.',health:'Mental exhaustion. Prone to nervous breakdowns and physical injuries.'}
    },
    yearlyInsights:{
      1:'Sowing & Pioneering. The beginning of a new 9-year cycle. Past burdens are cleared; this year is perfect for starting a business, changing jobs, or launching new plans. Take the first step bravely; the seeds planted this year determine the harvest for the next nine years.',
      2:'Dormancy & Cooperation. Slow down compared to last year\'s sprint. The focus is on leveraging and forming alliances. Cooperate with others, expand your network, and handle relationships. Avoid working alone or making emotional decisions.',
      3:'Action & Sharing. A highly active and turbulent year. You will have a strong desire to express yourself. Share, speak, market, and spread your ideas to the crowd. Control your temper, as impulsiveness leads to financial loss.',
      4:'Rooting & Stability. After previous changes, the focus is on stability. Excellent for buying property, building systems, or further education. Absolutely avoid high-risk speculation; securing your base is the victory.',
      5:'Flourishing & Upheaval. A year of massive breakthroughs. You\'ll feel a strong desire for freedom, unexpected direction shifts, or abundant cross-industry opportunities. Boldly embrace change, break the dullness, and explore the world.',
      6:'Blooming & Responsibility. Wealth manifests, but so do responsibilities. Focus must return to family, team building, or health healing. Large sums of money will flow; learn to use money to solve problems and be more tolerant of those around you.',
      7:'Fruiting & Benefactors. Perfect time for organizing resources and deep reflection. Benefactors will help, but you\'ll also face profound relationship tests (e.g., betrayal). Think deeply; use wisdom, not brute force.',
      8:'Harvest & Power. The pinnacle of wealth and career in the 9-year cycle. Go all out for business and show leadership. However, pressure is immense; monitor cardiovascular health and avoid excessive greed to prevent backlash.',
      9:'Rest & Reset. The end of the cycle. The sole theme is decluttering. Clear out unprofitable projects and draining relationships. Do charity to reset your mind and body. Absolutely do NOT start major new projects this year.'
    }
  }
};

/* ─── SvgBox component ─── */
const SvgBox = ({x,y,num}) =>
    e('g', null,
        e('rect',{x:x-18,y:y-20,width:36,height:40,className:'cls',fill:'#0B132B'}),
        e('text',{x,y:y+2,className:'ct'},num)
    );

/* ─── App ─── */
const App = () => {
    const [dob,   setDob]   = useState('01011984');
    const [lang,  setLang]  = useState('zh');
    const [tab,   setTab]   = useState('natal');
    const [imgErr,setImgErr]= useState(false);
    const [natal, setNatal] = useState(null);
    const [yearly,setYearly]= useState(null);
    const [hidden,setHidden]= useState(null);
    const yr = new Date().getFullYear();

    useEffect(()=>{
        if(!/^\d{8}$/.test(dob)) return;
        const n = calcNodes(dob);
        setNatal(n);
        setYearly(calcNodes(dob.slice(0,4)+yr));
        if(n.M===n.N){
            const mir = x => x===5?5:(x>5?x-5:x+5);
            setHidden(calcNodes('0'+mir(n.I)+'0'+mir(n.J)+'0'+mir(n.K)+'0'+mir(n.L)));
        } else {
            setHidden(null);
            if(tab==='hidden') setTab('natal');
        }
    },[dob,yr]);

    const cur = useMemo(()=>{
        if(tab==='yearly') return yearly;
        if(tab==='hidden') return hidden;
        return natal;
    },[tab,natal,yearly,hidden]);

    const elems = useMemo(()=>{
        if(!cur) return null;
        const nums=[cur.I,cur.J,cur.K,cur.L,cur.M,cur.N,cur.O,cur.T,cur.U,cur.V,cur.W,cur.X,cur.Y,cur.P,cur.Q,cur.R];
        const cnt={'金':0,'水':0,'火':0,'木':0,'土':0};
        nums.forEach(n=>{
            if([1,6].includes(n)) cnt['金']++;
            else if([2,7].includes(n)) cnt['水']++;
            else if([3,8].includes(n)) cnt['火']++;
            else if([4,9].includes(n)) cnt['木']++;
            else cnt['土']++;
        });
        let ri=0;
        if([4,9].includes(cur.O)) ri=0;
        else if([3,8].includes(cur.O)) ri=1;
        else if([5,0].includes(cur.O)) ri=2;
        else if([1,6].includes(cur.O)) ri=3;
        else ri=4;
        const t=i18n[lang];
        return t.elementsCols.map((role,i)=>{
            const orig=['木','火','土','金','水'][(ri+i)%5];
            return {role, el:t.elementsArr[(ri+i)%5], count:cnt[orig]};
        });
    },[cur,lang]);

    const isMirror = natal && natal.M===natal.N;
    const t = i18n[lang];

    if(!natal || !cur) {
        /* Minimal header while no valid DOB */
        return e('div',{className:'app'},
            e('div',{className:'hdr'},
                e('div',{className:'hdr-inner'},
                    e('div',{className:'hdr-left'},
                        e('div',{className:'logo-fb'},
                            e('span',{className:'logo-char'},'星'),
                            e('span',{className:'logo-char'},'财')
                        ),
                        e('h1',{className:'site-title'},t.title)
                    ),
                    e('div',{className:'hdr-right'},
                        e('div',{className:'dob-wrap'},
                            e('span',{className:'dob-lbl'},t.dobLabel),
                            e('input',{type:'text',value:dob,placeholder:'DDMMYYYY',className:'dob-inp',
                                onChange:ev=>setDob(ev.target.value.replace(/\D/g,'').slice(0,8))})
                        ),
                        e('button',{className:'lang-btn',onClick:()=>setLang(lang==='zh'?'en':'zh')},t.langToggle)
                    )
                )
            )
        );
    }

    /* Chart label */
    const chartLabel = tab==='natal' ? t.chartNatal
        : tab==='yearly' ? (t.chartYearly+' ['+yr+']')
        : t.chartHidden;

    /* Right col content */
    const isNatalOrHidden = tab==='natal' || tab==='hidden';

    const rightContent = isNatalOrHidden
        ? e('div',{style:{display:'flex',flexDirection:'column',gap:'2rem'}},
            /* MNO panel */
            e('div',{className:'panel',style:{padding:'2rem'}},
                e('div',{className:'ph divider-gold'},
                    e('h2',{className:'ptg'},t.mnoTitle),
                    e('span',{style:{fontFamily:'Noto Serif SC,serif',fontSize:'0.875rem',color:'#D4AF37',letterSpacing:'0.1em'}},
                        cur.M+' · '+cur.N+' · '+cur.O)
                ),
                e('p',{className:'mno-text'},
                    e('span',{className:'mno-lbl'},t.innerM+' ['+cur.M+']'),
                    lang==='zh' ? t.traits.inner[cur.M]+'。' : t.traits.inner[cur.M]+'.'
                ),
                e('p',{className:'mno-text'},
                    e('span',{className:'mno-lbl'},t.outerN+' ['+cur.N+']'),
                    lang==='zh'
                        ? '但在落实行动时，往往采取'+t.traits.outer[cur.N]+'。'
                        : 'But in execution, adopts '+t.traits.outer[cur.N]+'.'
                ),
                e('p',{className:'mno-foot'},
                    lang==='zh'?'两股能量交织，造就了独一无二的':'These energies entwine to create a unique',
                    e('strong',{style:{fontFamily:'Noto Serif SC,serif',fontSize:'1.1rem',color:'#E63946',padding:'0 0.5rem'}},
                        cur.O+' '+(lang==='zh'?'号':'-')+' '+t.traits.root[cur.O]),
                    lang==='zh'?'特质。':'trait.'
                )
            ),
            /* Fatal panel */
            e('div',{style:{background:'#11080A',border:'1px solid rgba(230,57,70,0.3)',padding:'2rem',borderRadius:'0.75rem',boxShadow:'0 5px 25px rgba(230,57,70,0.15)'}},
                e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(230,57,70,0.3)',paddingBottom:'1rem',marginBottom:'2rem'}},
                    e('h2',{className:'ptr'},t.fatalTitle),
                    e('span',{className:'psr'},t.fatalSub)
                ),
                e('div',{className:'f-sec'}, e('h3',{className:'f-ttl'},t.fatalWealth), e('p',{className:'f-txt'},t.insights[cur.O].wealth)),
                e('div',{className:'f-sec'}, e('h3',{className:'f-ttl'},t.fatalLove),   e('p',{className:'f-txt'},t.insights[cur.O].love)),
                e('div',{className:'f-sec'}, e('h3',{className:'f-ttl'},t.fatalHealth), e('p',{className:'f-txt'},t.insights[cur.O].health))
            )
          )
        : /* Yearly panel */
          e('div',{className:'panel',style:{padding:'2rem',borderTop:'4px solid #D4AF37',background:'#0D152D'}},
            e('div',{className:'ph divider-gold'},
                e('h2',{className:'pt'},t.yearlyTitle),
                e('span',{style:{fontFamily:'Noto Serif SC,serif',fontSize:'1rem',color:'#D4AF37',letterSpacing:'0.1em'}},t.yearlySub+' '+cur.O)
            ),
            e('p',{className:'y-txt'},t.yearlyInsights[cur.O]),
            e('div',{className:'y-foot'},t.yearlyInsight)
          );

    return e('div',{className:'app'},
        /* Header */
        e('div',{className:'hdr'},
            e('div',{className:'hdr-inner'},
                e('div',{className:'hdr-left'},
                    !imgErr
                        ? e('img',{src:'STELLAR CAI LOGO- BRIGHT.jpg',alt:'Stellar Cai Logo',
                            style:{height:'4rem',width:'auto',objectFit:'contain',mixBlendMode:'screen'},
                            onError:()=>setImgErr(true)})
                        : e('div',{className:'logo-fb'},
                            e('span',{className:'logo-char'},'星'),
                            e('span',{className:'logo-char'},'财')
                          ),
                    e('h1',{className:'site-title'},t.title)
                ),
                e('div',{className:'hdr-right'},
                    e('div',{className:'dob-wrap'},
                        e('span',{className:'dob-lbl'},t.dobLabel),
                        e('input',{type:'text',value:dob,placeholder:'DDMMYYYY',className:'dob-inp',
                            onChange:ev=>setDob(ev.target.value.replace(/\D/g,'').slice(0,8))})
                    ),
                    e('button',{className:'lang-btn',onClick:()=>setLang(lang==='zh'?'en':'zh')},t.langToggle)
                )
            )
        ),
        /* Main */
        e('div',{className:'main'},
            /* Mirror alert */
            isMirror && e('div',{className:'mirror-alert'},
                e('span',null,t.mirrorAlert),
                e('span',{style:{fontFamily:'Noto Serif SC,serif',fontStyle:'italic',color:'rgba(230,57,70,0.8)'}},t.mirrorTag)
            ),
            /* Tabs */
            e('div',{className:'tabs'},
                e('button',{className:'tab '+(tab==='natal'?'tab-g':'tab-off'),onClick:()=>setTab('natal')},t.tabNatal),
                e('button',{className:'tab '+(tab==='yearly'?'tab-g':'tab-off'),onClick:()=>setTab('yearly')},t.tabYearly+' ('+yr+')'),
                isMirror && e('button',{className:'tab '+(tab==='hidden'?'tab-r':'tab-roff'),onClick:()=>setTab('hidden')},t.tabHidden)
            ),
            /* Grid */
            e('div',{className:'grid'},
                /* Left: SVG chart */
                e('div',{className:'panel',style:{padding:'2.5rem',display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden'}},
                    e('div',{className:'chart-hdr divider-gold',style:{width:'100%'}},
                        e('span',{className:'chart-lbl'},chartLabel),
                        e('span',{className:'chart-dob'},cur.s)
                    ),
                    e('svg',{viewBox:'80 50 640 580',style:{width:'100%',height:'auto'}},
                        e('g',{className:'cl'},
                            e('line',{x1:160,y1:140,x2:640,y2:140}),
                            e('line',{x1:160,y1:140,x2:400,y2:460}),
                            e('line',{x1:640,y1:140,x2:400,y2:460}),
                            e('line',{x1:250,y1:260,x2:550,y2:260}),
                            e('line',{x1:325,y1:360,x2:475,y2:360}),
                            e('line',{x1:270,y1:140,x2:270,y2:260}),
                            e('line',{x1:400,y1:140,x2:400,y2:360}),
                            e('line',{x1:530,y1:140,x2:530,y2:260}),
                            e('line',{x1:100,y1:460,x2:700,y2:460,strokeWidth:2})
                        ),
                        e(SvgBox,{key:'A',x:180,y:100,num:cur.A}), e(SvgBox,{key:'B',x:230,y:100,num:cur.B}),
                        e(SvgBox,{key:'C',x:310,y:100,num:cur.C}), e(SvgBox,{key:'D',x:360,y:100,num:cur.D}),
                        e(SvgBox,{key:'E',x:440,y:100,num:cur.E}), e(SvgBox,{key:'F',x:490,y:100,num:cur.F}),
                        e(SvgBox,{key:'G',x:570,y:100,num:cur.G}), e(SvgBox,{key:'H',x:620,y:100,num:cur.H}),
                        e('text',{x:205,y:205,className:'ctlg'},cur.I),
                        e('text',{x:335,y:205,className:'ctlg'},cur.J),
                        e('text',{x:465,y:205,className:'ctlg'},cur.K),
                        e('text',{x:595,y:205,className:'ctlg'},cur.L),
                        e('text',{x:325,y:315,className:'ctlg',style:{fill:'#D4AF37'}},cur.M),
                        e('text',{x:475,y:315,className:'ctlg',style:{fill:'#D4AF37'}},cur.N),
                        e('circle',{cx:400,cy:420,r:30,fill:'#0B132B',stroke:'#E63946',strokeWidth:3}),
                        e('text',{x:400,y:420,className:'ctr'},cur.O),
                        e(SvgBox,{key:'V',x:120,y:430,num:cur.V}),
                        e('text',{x:160,y:432,className:'ct',fill:'#C5A059'},'='),
                        e(SvgBox,{key:'T',x:200,y:430,num:cur.T}),
                        e(SvgBox,{key:'U',x:250,y:430,num:cur.U}),
                        e(SvgBox,{key:'W',x:550,y:430,num:cur.W}),
                        e(SvgBox,{key:'X',x:600,y:430,num:cur.X}),
                        e('text',{x:640,y:432,className:'ct',fill:'#C5A059'},'='),
                        e(SvgBox,{key:'Y',x:680,y:430,num:cur.Y}),
                        e(SvgBox,{key:'P',x:350,y:510,num:cur.P}),
                        e(SvgBox,{key:'Q',x:450,y:510,num:cur.Q}),
                        e(SvgBox,{key:'R',x:400,y:580,num:cur.R})
                    )
                ),
                /* Right col */
                e('div',{className:'rcol'},
                    /* Elements table */
                    e('div',{className:'panel',style:{padding:'2rem'}},
                        e('div',{className:'ph divider-gold'},
                            e('h2',{className:'pt'},t.elementsTitle),
                            e('span',{className:'ps'},t.elementsSub)
                        ),
                        elems && e('table',{className:'etbl'},
                            e('thead',null, e('tr',null, elems.map((it,i)=>e('th',{key:i},it.role)))),
                            e('tbody',null,
                                e('tr',null, elems.map((it,i)=>e('td',{key:i,className:'el'},it.el))),
                                e('tr',null, elems.map((it,i)=>e('td',{key:i,className:'ec',style:{
                                    color:it.count===0?'#E63946':it.count>3?'#D4AF37':'#4ADE80'
                                }},it.count)))
                            )
                        ),
                        e('div',{className:'bm'},t.elementsBenchmark)
                    ),
                    rightContent
                )
            )
        )
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
</html>
